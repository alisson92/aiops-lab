# RBAC namespaced (Tier A) — sem recursos cluster-scoped.
# Concede ao backend do Keep permissão mínima para buscar eventos de pod
# usados pelo step get-pod-events do workflow de enriquecimento.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keep-pod-reader
  namespace: aiops-lab
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keep-pod-reader
  namespace: aiops-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: keep-pod-reader
subjects:
  # O chart keephq/keep cria um SA com o mesmo nome do release ("keep").
  - kind: ServiceAccount
    name: keep
    namespace: aiops-lab
