# env/prod.yaml — valores para o ambiente de produção (EKS)
# ⚠️  NUNCA commitar valores reais aqui. Preencher via pipeline (CI/CD) ou Vault.

namespace: aiops-lab
storageClass: <EKS_STORAGECLASS_NAME>   # confirmar com time de infra antes do deploy
ollamaEndpoint: http://ollama.aiops-lab.svc.cluster.local:11434
grafanaAdminPassword: ""                # injetado via Secret externo no pipeline
teamsWebhookUrl: ""                     # injetado via variável gerenciada centralmente

# URL externa do Keep frontend — necessária para redirects corretos do NextAuth.
# Em produção, usar a URL real do Ingress/LoadBalancer do Keep frontend.
keepFrontendUrl: ""                     # ex: https://keep.empresa.com
