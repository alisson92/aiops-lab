apiVersion: batch/v1
kind: CronJob
metadata:
  name: k8sgpt-keep-bridge
  namespace: {{ .Release.Namespace }}
  labels:
    app: k8sgpt-keep-bridge
spec:
  schedule: {{ .Values.schedule | quote }}
  # Evita runs simultâneos se um job demorar mais de 1 minuto
  concurrencyPolicy: Forbid
  # Mantém histórico mínimo para debugging no keep-bootstrap
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit:     3
  jobTemplate:
    spec:
      # Timeout máximo por run (não deve ultrapassar o intervalo do schedule)
      activeDeadlineSeconds: 55
      template:
        metadata:
          labels:
            app: k8sgpt-keep-bridge
        spec:
          serviceAccountName: k8sgpt-keep-bridge
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser:    65534   # nobody
          containers:
            - name: bridge
              image: {{ .Values.image | quote }}
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu:    "50m"
                  memory: "64Mi"
                limits:
                  cpu:    "200m"
                  memory: "128Mi"
              env:
                - name:  KEEP_URL
                  value: {{ .Values.keepUrl | quote }}
                - name:  KEEP_API_KEY
                  value: {{ .Values.keepApiKey | quote }}
              command: ["python3", "/scripts/bridge.py"]
              volumeMounts:
                - name:      script
                  mountPath: /scripts
                  readOnly:  true
          volumes:
            - name: script
              configMap:
                name: k8sgpt-keep-bridge-script
