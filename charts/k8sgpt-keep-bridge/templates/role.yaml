apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8sgpt-keep-bridge
  namespace: {{ .Release.Namespace }}
  labels:
    app: k8sgpt-keep-bridge
rules:
  # Leitura dos Result CRDs gerados pelo K8sGPT operator
  - apiGroups: ["core.k8sgpt.ai"]
    resources: ["results"]
    verbs:     ["get", "list"]
