apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt-lab
  namespace: {{ .Release.Namespace }}
spec:
  repository: ghcr.io/k8sgpt-ai/k8sgpt
  # ⚠️ spec.version É OBRIGATÓRIO — sem ele o operator oscila entre "latest" e tag vazia,
  #    gerando cycling infinito de ReplicaSets.
  # ⚠️ Compatibilidade gRPC: k8sgpt >= v0.4.x obrigatório para operator v0.2.27.
  #    v0.3.x expõe ServerService (legado); v0.4.x expõe ServerAnalyzerService.
  version: v0.4.33
  ai:
    enabled: true
    model: gemma2:2b
    backend: localai   # localai consome a API OpenAI-compat do Ollama (/v1)
    baseUrl: http://ollama.{{ .Release.Namespace }}.svc.cluster.local:11434/v1
    maxTokens: "2048"
  noCache: false
  filters:
    - Pod
    - Deployment
    - ReplicaSet
