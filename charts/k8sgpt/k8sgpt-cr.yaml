# K8sGPT CR — configura o operator para analisar o cluster usando Ollama como backend LLM.
# Aplicar APÓS o operator estar Running: kubectl apply -f charts/k8sgpt/k8sgpt-cr.yaml -n aiops-lab
#
# Resultados disponíveis em:
#   kubectl get results -n aiops-lab
#
# ⚠️  spec.version É OBRIGATÓRIO — sem ele o operator oscila entre tag "latest" e tag vazia,
#     gerando cycling infinito de ReplicaSets. Validado: operator v0.2.27 + k8sgpt v0.4.33.
# ⚠️  Compatibilidade gRPC: k8sgpt >= v0.4.x obrigatório para operator v0.2.27.
#     v0.3.x expõe ServerService (legado); v0.4.x expõe ServerAnalyzerService (esperado pelo operator).
apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt-lab
  namespace: aiops-lab
spec:
  repository: ghcr.io/k8sgpt-ai/k8sgpt
  version: v0.4.33             # obrigatório — ver aviso acima
  ai:
    enabled: true
    model: gemma2:2b           # baseline da Fase 1; trocar para outro modelo da Fase 0 conforme necessário
    backend: localai           # localai consome a API OpenAI-compat do Ollama (/v1)
    baseUrl: http://ollama.aiops-lab.svc.cluster.local:11434/v1
    maxTokens: "2048"
  noCache: false               # força análise fresca a cada ciclo
  filters:                     # escopo: apenas recursos relevantes para os 4 cenários de falha
    - Pod
    - Deployment
    - ReplicaSet
