# Vincula a Role keep-pod-reader ao ServiceAccount do backend do Keep.
# Tier A: RoleBinding é namespaced — sem impacto fora de {{ .Values.namespace }}.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keep-pod-reader
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: keep-rbac
    app.kubernetes.io/managed-by: Helm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: keep-pod-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.keepBackendServiceAccount }}
    namespace: {{ .Values.namespace }}
