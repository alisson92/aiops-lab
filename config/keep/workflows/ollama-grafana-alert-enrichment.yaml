workflow:
  id: ollama-grafana-alert-enrichment
  name: Ollama Grafana Alert Enrichment
  description: "Enriquece alertas Grafana: eventos do pod via K8s API + RCA com Ollama phi3.5:3.8b."
  triggers:
    - type: alert
      filters:
        - key: source
          value: grafana
  steps:
    - name: get-pod-events
      # Busca eventos recentes do pod — mostra OOMKilled, BackOff, FailedPull, etc.
      # get_logs foi removido: KubernetesProvider v0.1.96 não suporta previous=True,
      # então logs ficam vazios em CrashLoop/OOMKilled; e o step falha com 404
      # quando o pod é deletado após rollout undo, quebrando o workflow inteiro.
      provider:
        config: "{{ providers.kubernetes-local }}"
        type: kubernetes
        with:
          command_type: get_events
          namespace: "{{ alert.labels.namespace }}"
          pod_name: "{{ alert.labels.pod }}"

    - name: get-rca
      provider:
        config: "{{ providers.ollama-local }}"
        type: ollama
        with:
          prompt: >
            You are a Kubernetes SRE. Analyze the alert and pod events below.

            Respond with ONLY this JSON object — no other text, no markdown, no explanation outside the JSON:
            {"root_cause": "one sentence", "immediate_action": "kubectl command", "prevention": "one sentence"}

            The keys MUST be exactly: root_cause, immediate_action, prevention.
            Use the actual pod name and namespace in immediate_action.

            Scenario: {{ alert.labels.scenario }}
            Namespace: {{ alert.labels.namespace }}
            Pod: {{ alert.labels.pod }}
            Severity: {{ alert.severity }}

            Pod events:
            {{ steps.get-pod-events.results }}
          model: "phi3.5:3.8b"
          # 200 tokens são suficientes para o JSON de 3 campos — menos espaço = menos hallucination.
          max_tokens: 200
          structured_output_format: "json"

  actions:
    - name: enrich-alert
      provider:
        type: mock
        with:
          enrich_alert:
            - key: ai_rca
              value: "{{ steps.get-rca.results }}"
            - key: k8s_events
              value: "{{ steps.get-pod-events.results }}"
            - key: affected_pod
              value: "{{ alert.labels.pod }}"

    - name: notify-teams
      # Envia payload estruturado para o Power Automate formatar o Adaptive Card.
      # Cada fact é um campo independente — PA parseia por name, não por string combinada.
      # Keep não suporta acesso aninhado: steps.get-rca.results vai como string em rca_raw.
      provider:
        type: teams
        config: "{{ providers.teams-webhook }}"
        with:
          typeCard: "MessageCard"
          themeColor: "D9534F"
          message: "AIOps Lab — Kubernetes alert"
          sections: >
            [{"facts": [
              {"name": "scenario",  "value": "{{ alert.labels.scenario }}"},
              {"name": "pod",       "value": "{{ alert.labels.pod }}"},
              {"name": "namespace", "value": "{{ alert.labels.namespace }}"},
              {"name": "severity",  "value": "{{ alert.severity }}"},
              {"name": "rca_raw",   "value": "{{ steps.get-rca.results }}"}
            ]}]
