# helmfile.yaml — orquestra os três releases do lab
#
# Uso:
#   helmfile -e local sync          # instala/atualiza tudo
#   helmfile -e local apply         # aplica apenas o diff (mais seguro)
#   helmfile -e local diff          # visualiza o que seria alterado
#   helmfile -e local -l name=keep sync   # opera em um release isolado
#
# Após o primeiro deploy: kubectl apply -f manifests/ && bash scripts/keep-bootstrap.sh

repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: ollama-helm
    url: https://helm.otwld.com/
  - name: keephq
    url: https://keephq.github.io/helm-charts

environments:
  local:
    values:
      - env/local.yaml
  prod:
    values:
      - env/prod.yaml

---

releases:

  # ── 1. Métricas e alertas ──────────────────────────────────────────────────
  - name: kube-prometheus-stack
    namespace: "{{ .Values.namespace }}"
    createNamespace: true
    chart: prometheus-community/kube-prometheus-stack
    version: "86.1.0"
    values:
      - values/kube-prometheus-stack.yaml

  # ── 2. Inferência LLM (CPU-only, offline) ─────────────────────────────────
  - name: ollama
    namespace: "{{ .Values.namespace }}"
    chart: ollama-helm/ollama
    version: "1.57.0"
    values:
      - values/ollama.yaml
    needs:
      - kube-prometheus-stack

  # ── 3. Plataforma de alertas ───────────────────────────────────────────────
  - name: keep
    namespace: "{{ .Values.namespace }}"
    chart: keephq/keep
    version: "0.1.96"
    values:
      - values/keep.yaml
    needs:
      - kube-prometheus-stack
