# Override values para o chart k8sgpt-keep-bridge
# Sync K8sGPT Result CRDs → Keep alerts a cada minuto

# Imagem Python mínima — sem dependências externas além da stdlib
image: "python:3.11-alpine"

# Schedule em cron syntax: a cada minuto
schedule: "*/1 * * * *"

# Endpoint interno do Keep backend (cluster DNS)
keepUrl: "http://keep-backend.aiops-lab.svc.cluster.local:8080"

# API key do Keep (mesmo valor do bootstrap)
keepApiKey: "keepappkey"
