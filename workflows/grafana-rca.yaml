workflow:
  id: grafana-rca-enrichment
  name: Grafana RCA Enrichment
  description: "Enriquece alertas do Grafana com eventos do pod e RCA gerado pelo Ollama (gemma2:2b)."
  # Throttle por fingerprint: evita chamar o Ollama múltiplas vezes para o mesmo alerta.
  throttle: 1800
  triggers:
    - type: alert
      filters:
        - key: source
          value: grafana
  steps:
    - name: get-pod-events
      # Busca eventos recentes do pod (OOMKilled, BackOff, FailedPull, etc.).
      # Requer: provider kubernetes-local instalado + manifests/keep-rbac.yaml aplicado.
      provider:
        config: "{{ providers.kubernetes-local }}"
        type: kubernetes
        with:
          command_type: get_events
          namespace: "{{ alert.labels.namespace }}"
          pod_name: "{{ alert.labels.pod }}"

    - name: get-rca
      # Requer: provider ollama-local instalado apontando para o Service do Ollama.
      provider:
        config: "{{ providers.ollama-local }}"
        type: ollama
        with:
          prompt: >
            You are a Kubernetes SRE. Analyze the alert and pod events below
            and respond ONLY with a JSON object — no markdown, no explanation.

            Required JSON fields:
            - root_cause: one sentence explaining the most likely cause
            - immediate_action: exact kubectl command to investigate or remediate
            - prevention: one sentence on how to prevent recurrence

            Scenario: {{ alert.labels.scenario }}
            Namespace: {{ alert.labels.namespace }}
            Pod: {{ alert.labels.pod }}
            Severity: {{ alert.severity }}

            Pod events:
            {{ steps.get-pod-events.results }}
          model: "gemma2:2b"
          max_tokens: 400
          structured_output_format: "json"

  actions:
    - name: enrich-alert
      provider:
        type: mock
        with:
          enrich_alert:
            - key: ai_rca
              value: "{{ steps.get-rca.results }}"
            - key: k8s_events
              value: "{{ steps.get-pod-events.results }}"
            - key: affected_pod
              value: "{{ alert.labels.pod }}"
